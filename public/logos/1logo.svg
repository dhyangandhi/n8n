<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C6FF"/>
      <stop offset="30%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#FF3CAC"/>
    </linearGradient>
  </defs>

  <!-- Connections -->
  <line x1="100" y1="40" x2="40" y2="100" stroke="url(#grad)" stroke-width="6"/>
  <line x1="100" y1="40" x2="160" y2="100" stroke="url(#grad)" stroke-width="6"/>
  <line x1="40" y1="100" x2="100" y2="160" stroke="url(#grad)" stroke-width="6"/>
  <line x1="160" y1="100" x2="100" y2="111" stroke="url(#grad)" stroke-width="6"/>

  <!-- Nodes -->
  <circle cx="100" cy="40" r="12" fill="url(#grad)"/>
  <circle cx="40" cy="100" r="12" fill="url(#grad)"/>
  <circle cx="160" cy="100" r="12" fill="url(#grad)"/>
  <circle cx="100" cy="160" r="12" fill="url(#grad)"/>
  <circle cx="100" cy="100" r="14" fill="url(#grad)"/>

</svg>